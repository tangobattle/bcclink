  <g transform="rotate(-34 101 101)">
    <ellipse cx="101" cy="101" rx="76.5" ry="38.8" fill="#ccff00"/>
    <ellipse cx="101" cy="101" rx="57.3" ry="25.4" fill="#ffffff"/>
  </g>
  <!-- purple ring -->
  <circle cx="101" cy="101" r="89" fill="none" stroke="#cc99ff" stroke-width="19"/>
  <!-- outlines -->
  <circle cx="101" cy="101" r="78" fill="none" stroke="#000000" stroke-width="2"/>
  <circle cx="101" cy="101" r="99.75" fill="none" stroke="#000000" stroke-width="2"/>
